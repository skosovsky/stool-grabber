version: "1.0"
target:
  channel_username: "@dindex"
  parse_depth: 50
  delay_ms: 1500
filter:
  min_comments_to_analyze: 4
  min_unique_posts: 2
  max_users_to_analyze: 20
  exclude_admins: false
llm:
  provider: "openrouter"
  model: "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"
  temperature: 0.1
  timeout_seconds: 900
  prompt_template: >
    Ты — суровый аналитик социальных взаимодействий и профилировщик аудитории.
    Твоя задача — извлечь социальный граф из предоставленного JSON-дампа комментариев Telegram-канала.

    ЖЕСТКИЕ ПРАВИЛА:
    1. Запрещено додумывать факты, юзернеймы или сообщения. Опирайся строго на входные данные.
    2. Соблюдай строгий JSON-контракт.
    3. Анализируй не только смысл слов, но и форму: пассивная агрессия, длина сообщений, склонность поправлять других.

    ЗАПОЛНИ ПОЛЯ СХЕМЫ СЛЕДУЮЩИМ ОБРАЗОМ:
    - agitators: Выбери 3-5 самых активных пользователей, которые разгоняют ветки.
      Если пользователей в дампе меньше 3 — верни всех доступных (не выдумывай).
      Для каждого заполни:
      - user: точное значение поля user из входных данных (категорически запрещено выдумывать).
      - message_count: точное количество сообщений этого пользователя в дампе (= длина массива messages).
      - what_triggers: 1-2 темы или стиля общения, которые заставляют его отвечать.
      - style: Роль в стае (Токсик / Душнила / Эксперт-Теоретик / Тролль / Защитник) + 1 короткая фраза про манеру общения.
      - wont_pass_by: Идеальная наживка. 1 конкретный спорный тезис, мимо которого он физически не сможет пройти.

    - hot_topics: 3 главные темы, вызывающие самые жесткие холивары на площадке (короткие формулировки).

    - notes: Краткая выжимка (2-3 абзаца) о сути конфликтов на площадке. Опиши, какие основные \"лагеря\" здесь сталкиваются и кто против кого обычно воюет.
output:
  format: "markdown"
  filepath: "./reports/target_channel_report.md"
